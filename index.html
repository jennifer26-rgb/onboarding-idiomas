<style>
/* ================================================================
   DESIGN SYSTEM — Universidad Científica del Sur · Centro de Idiomas
   Brand: Electric Blue #1800ac · Orange #fe7900 · White
================================================================ */
:root {
  --brand:         #1800ac;
  --brand-deep:    #120085;
  --brand-mid:     #2215c8;
  --brand-light:   #e8e4ff;
  --brand-glow:    rgba(24,0,172,0.15);
  --orange:        #fe7900;
  --orange-light:  #fff3e6;
  --orange-dark:   #d96500;
  --white:         #ffffff;
  --bg:            #f5f6fa;
  --bg2:           #eef0f8;
  --surface:       #ffffff;
  --border:        #e4e7f0;
  --border-hover:  #c5c9e0;
  --text-1:        #0f1529;
  --text-2:        #3d4466;
  --text-3:        #8890b0;
  --success:       #10b981;
  --success-bg:    #d1fae5;
  --font:          'Plus Jakarta Sans', system-ui, sans-serif;
  --r:             10px;
  --r-lg:          16px;
  --r-xl:          22px;
  --sh:            0 1px 4px rgba(15,21,41,0.06), 0 4px 16px rgba(15,21,41,0.06);
  --sh-md:         0 4px 24px rgba(15,21,41,0.10);
  --sh-lg:         0 12px 48px rgba(15,21,41,0.14);
  --ease:          cubic-bezier(0.4,0,0.2,1);
  --sidebar-w:     252px;
  --header-h:      68px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { font-size:16px; scroll-behavior:smooth }
body { font-family:var(--font); background:var(--bg); color:var(--text-1); min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px }

/* ================================================================
   HEADER — uses the brand image as background
================================================================ */
.site-header {
  position: fixed;
  top:0; left:0; right:0;
  height: var(--header-h);
  background: #1800ac;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px 0 24px;
  z-index: 300;
  box-shadow: 0 2px 20px rgba(24,0,172,0.4);
}

/* Logo sits inside header, sized to fit the 68px height */
.header-logo img {
  height: 40px;
  width: auto;
  object-fit: contain;
  display: block;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 99px;
  padding: 5px 13px;
  font-size: 0.7rem;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
}

.pill-count {
  background: var(--orange);
  color: white;
  border-radius: 99px;
  padding: 2px 8px;
  font-size: 0.68rem;
  font-weight: 800;
}

.menu-toggle {
  display: none;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  cursor: pointer;
  padding: 7px 9px;
  color: white;
  font-size: 18px;
  line-height: 1;
  transition: background 0.2s;
}
.menu-toggle:hover { background: rgba(255,255,255,0.2) }

/* ================================================================
   LAYOUT
================================================================ */
.app-layout {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

.sidebar-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(15,21,41,0.45);
  backdrop-filter: blur(3px);
  z-index: 199;
  opacity: 0;
  transition: opacity 0.3s;
}

/* ================================================================
   SIDEBAR
================================================================ */
.sidebar {
  position: fixed;
  top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 200;
  transition: transform 0.3s var(--ease);
  box-shadow: 2px 0 16px rgba(15,21,41,0.05);
}

.sb-top {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}

.sb-eyebrow {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 3px;
}

.sb-title {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-1);
  line-height: 1.35;
}

/* Progress ring + bar */
.sb-progress {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.sb-prog-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.sb-prog-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
}

.sb-prog-pct {
  font-size: 0.78rem;
  font-weight: 800;
  color: var(--brand);
}

.prog-track {
  height: 5px;
  background: var(--bg2);
  border-radius: 99px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--brand-mid), var(--orange));
  border-radius: 99px;
  transition: width 0.55s var(--ease);
}

/* Nav */
.nav-section {
  padding: 10px 10px 8px;
  flex: 1;
}

.nav-section-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 0 6px;
  margin-bottom: 4px;
  margin-top: 4px;
}

.nav-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--r);
  border: 1.5px solid transparent;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  margin-bottom: 2px;
  font-family: var(--font);
  text-align: left;
  position: relative;
}

.nav-btn:hover {
  background: var(--bg);
  border-color: var(--border);
}

.nav-btn.active {
  background: linear-gradient(135deg, rgba(24,0,172,0.06) 0%, rgba(254,121,0,0.04) 100%);
  border-color: rgba(24,0,172,0.18);
}

.nav-btn.active::before {
  content: '';
  position: absolute;
  left: -10px; top: 20%; bottom: 20%;
  width: 3px;
  background: linear-gradient(180deg, var(--brand), var(--orange));
  border-radius: 99px;
}

.nav-btn.active .nav-ico-wrap {
  background: linear-gradient(135deg, var(--brand), var(--brand-mid));
  box-shadow: 0 3px 10px rgba(24,0,172,0.3);
}

.nav-btn.visited .nav-chk { display: flex }

.nav-ico-wrap {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  transition: all 0.2s;
}

.nav-btn.active .nav-ico-wrap { font-size: 14px }

.nav-lbl {
  flex: 1;
  font-size: 0.79rem;
  font-weight: 500;
  color: var(--text-2);
  line-height: 1.3;
  transition: color 0.2s;
}

.nav-btn.active .nav-lbl { color: var(--text-1); font-weight: 700 }

.nav-chk {
  display: none;
  width: 16px; height: 16px;
  background: var(--success);
  border-radius: 50%;
  align-items: center; justify-content: center;
  font-size: 9px; color: white;
  flex-shrink: 0;
}

/* Sidebar footer */
.sb-footer {
  margin-top: auto;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.sb-contact {
  font-size: 0.69rem;
  color: var(--text-3);
  line-height: 1.75;
}

.sb-contact strong { color: var(--text-2); font-size: 0.72rem }
.sb-contact a { color: var(--brand); text-decoration: none; font-weight: 600 }

/* ================================================================
   MAIN CONTENT
================================================================ */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: calc(100vh - var(--header-h));
  display: flex;
  flex-direction: column;
}

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 11px 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  position: sticky;
  top: var(--header-h);
  z-index: 10;
}

.crumb {
  font-size: 0.72rem;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 5px;
}

.crumb-sep { color: var(--border-hover) }
.crumb-current { color: var(--brand); font-weight: 700 }

.body-wrap {
  padding: 28px 28px 40px;
  max-width: 920px;
  width: 100%;
  flex: 1;
}

/* ================================================================
   SECTION HERO
================================================================ */
.hero {
  background: linear-gradient(135deg, var(--brand-deep) 0%, var(--brand) 55%, var(--brand-mid) 100%);
  border-radius: var(--r-xl);
  padding: 32px 36px;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.38s var(--ease) both;
}

.hero::before {
  content:'';
  position:absolute; top:-50px; right:-50px;
  width:240px; height:240px;
  background: radial-gradient(circle, rgba(254,121,0,0.18) 0%, transparent 65%);
  border-radius:50%;
  pointer-events:none;
}
.hero::after {
  content:'';
  position:absolute; bottom:-60px; left:25%;
  width:200px; height:200px;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
  border-radius:50%;
  pointer-events:none;
}

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(254,121,0,0.18);
  border: 1px solid rgba(254,121,0,0.35);
  color: #ffb84d;
  padding: 3px 11px;
  border-radius: 99px;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 13px;
}

.hero h1 {
  font-size: 1.6rem;
  font-weight: 800;
  color: white;
  line-height: 1.22;
  margin-bottom: 9px;
  letter-spacing: -0.02em;
}

.hero p {
  color: rgba(255,255,255,0.62);
  font-size: 0.875rem;
  font-weight: 400;
  line-height: 1.65;
  max-width: 500px;
}

/* ================================================================
   CARDS
================================================================ */
.card {
  background: var(--surface);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  box-shadow: var(--sh);
  overflow: hidden;
  margin-bottom: 18px;
  animation: fadeUp 0.35s var(--ease) both;
}

.card-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.card-ico {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(24,0,172,0.07), rgba(254,121,0,0.08));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.card-ttl {
  font-size: 0.94rem;
  font-weight: 700;
  color: var(--text-1);
  line-height: 1.25;
}

.card-sub {
  font-size: 0.71rem;
  color: var(--text-3);
  margin-top: 2px;
}

.card-body { padding: 20px }

/* ================================================================
   STAT GRID
================================================================ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 12px;
  margin-bottom: 18px;
}

.stat-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  padding: 16px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--sh);
  animation: fadeUp 0.4s var(--ease) both;
}

.stat-card:nth-child(1){animation-delay:.04s}
.stat-card:nth-child(2){animation-delay:.08s}
.stat-card:nth-child(3){animation-delay:.12s}

.stat-card::after {
  content:'';
  position:absolute; top:0; right:0;
  width:56px; height:56px;
  border-radius: 0 var(--r-lg) 0 56px;
  opacity: 0.07;
}
.stat-card.c1::after { background: var(--brand) }
.stat-card.c2::after { background: var(--orange) }
.stat-card.c3::after { background: #10b981 }

.s-ico { font-size:20px; margin-bottom:9px; display:block }

.s-val {
  font-size: 1.55rem;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}

.stat-card.c1 .s-val { color: var(--brand) }
.stat-card.c2 .s-val { color: var(--orange) }
.stat-card.c3 .s-val { color: #10b981 }

.s-lbl {
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ================================================================
   STEP LIST (recorrido)
================================================================ */
.step-list { display:flex; flex-direction:column }

.step-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 13px 10px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all 0.2s var(--ease);
  border-bottom: 1px solid var(--border);
}
.step-row:last-child { border-bottom: none }
.step-row:hover { background: var(--bg); padding-left: 14px }

.step-num {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand), var(--brand-mid));
  color: white;
  display: flex; align-items:center; justify-content:center;
  font-size: 0.73rem; font-weight: 800;
  flex-shrink: 0;
  box-shadow: 0 3px 8px rgba(24,0,172,0.25);
}

.step-info { flex: 1 }
.step-ttl { font-size: 0.85rem; font-weight: 700; color: var(--text-1); margin-bottom: 2px }
.step-desc { font-size: 0.74rem; color: var(--text-3); line-height: 1.5 }
.step-arrow { font-size: 12px; color: var(--text-3); align-self: center; transition: all 0.2s }
.step-row:hover .step-arrow { color: var(--orange); transform: translateX(4px) }

/* ================================================================
   VIDEO
================================================================ */
.video-box {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  border-radius: var(--r);
  overflow: hidden;
  background: var(--brand-deep);
  box-shadow: var(--sh-md);
}
.video-box iframe { position:absolute; inset:0; width:100%; height:100%; border:none }

/* ================================================================
   2-COL GRID (requirements / features)
================================================================ */
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.g-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 12px 14px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  cursor: default;
  transition: all 0.2s;
  font-family: var(--font);
  text-decoration: none;
}
.g-item:hover { background: var(--surface); border-color: var(--brand); box-shadow: var(--sh); transform: translateY(-1px) }

.g-ico {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--brand-deep), var(--brand-mid));
  display:flex; align-items:center; justify-content:center;
  font-size: 16px; flex-shrink: 0;
}

.g-lbl { font-size: 0.8rem; font-weight: 700; color: var(--text-1); display:block }
.g-sub { font-size: 0.69rem; color: var(--text-3); margin-top: 1px }
.g-arr { font-size: 11px; color: var(--text-3); margin-left:auto; transition: all 0.2s }
.g-item:hover .g-arr { color: var(--brand); transform: translateX(3px) }

/* ================================================================
   CHIPS
================================================================ */
.chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:14px }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 0.71rem;
  font-weight: 700;
  border: 1px solid;
}
.chip.b { background: rgba(24,0,172,0.06); color: var(--brand); border-color: rgba(24,0,172,0.18) }
.chip.o { background: rgba(254,121,0,0.07); color: var(--orange-dark); border-color: rgba(254,121,0,0.22) }
.chip.g { background: var(--success-bg); color: #047857; border-color: #6ee7b7 }

/* ================================================================
   PDF ROWS
================================================================ */
.pdf-row {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 13px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  transition: all 0.2s;
}
.pdf-row:hover { background: var(--surface); border-color: var(--border-hover); box-shadow: var(--sh) }
.pdf-row + .pdf-row { margin-top: 9px }

.pdf-ico {
  width: 42px; height: 42px;
  border-radius: 10px;
  display:flex; align-items:center; justify-content:center;
  font-size: 20px; flex-shrink: 0;
}

.pdf-info { flex: 1 }
.pdf-name { font-size: 0.84rem; font-weight: 700; color: var(--text-1) }
.pdf-meta { font-size: 0.69rem; color: var(--text-3); margin-top: 2px }

/* ================================================================
   FAQ ACCORDION
================================================================ */
.faq-stack { display:flex; flex-direction:column; gap:6px }

.faq-item {
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color 0.2s;
}
.faq-item:hover { border-color: var(--border-hover) }
.faq-item.open { border-color: var(--brand); box-shadow: 0 2px 16px rgba(24,0,172,0.08) }

.faq-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  background: var(--surface);
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-1);
  text-align: left;
  transition: background 0.2s;
}
.faq-btn:hover { background: var(--bg) }
.faq-item.open .faq-btn { background: rgba(24,0,172,0.03) }

.faq-arr {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--bg2);
  display:flex; align-items:center; justify-content:center;
  font-size: 10px; color: var(--text-2);
  flex-shrink: 0;
  transition: transform 0.28s var(--ease), background 0.2s;
}
.faq-item.open .faq-arr { transform: rotate(180deg); background: var(--brand); color: white }

.faq-ans {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.38s var(--ease);
  font-size: 0.82rem;
  color: var(--text-2);
  line-height: 1.75;
  background: rgba(24,0,172,0.02);
}
.faq-item.open .faq-ans { max-height: 300px }
.faq-ans-inner { padding: 12px 18px 16px; border-top: 1px solid var(--border) }

/* ================================================================
   IA CHAT
================================================================ */
.chat-wrap { border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border) }

.chat-top {
  background: linear-gradient(135deg, var(--brand-deep), var(--brand));
  padding: 13px 18px;
  display: flex; align-items: center; gap: 12px;
}

.chat-av {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff9900, var(--orange));
  display:flex; align-items:center; justify-content:center;
  font-size: 17px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

.chat-name { font-size: 0.86rem; font-weight: 700; color: white }
.chat-status { font-size: 0.67rem; color: rgba(255,255,255,0.55); display:flex; align-items:center; gap:5px }

.dot-live {
  width: 6px; height: 6px;
  background: #10b981;
  border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.chat-msgs {
  background: var(--bg);
  padding: 18px;
  display:flex; flex-direction:column; gap:11px;
  min-height: 110px;
}

.msg { display:flex; align-items:flex-start; gap:9px; animation: fadeUp 0.25s ease }

.bubble {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 0.82rem;
  line-height: 1.6;
}
.bubble.bot { background:var(--surface); color:var(--text-1); border-radius:3px 14px 14px 14px; box-shadow:var(--sh) }

.chat-action {
  padding: 14px 18px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}

.chat-note { text-align:center; font-size:0.68rem; color:var(--text-3); margin-top:8px }

/* ================================================================
   BUTTONS
================================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--r);
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  text-decoration: none;
  letter-spacing: 0.01em;
}
.btn-brand { background: linear-gradient(135deg, var(--brand-deep), var(--brand-mid)); color:white; box-shadow:0 3px 12px rgba(24,0,172,0.28) }
.btn-brand:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(24,0,172,0.35) }
.btn-orange { background: linear-gradient(135deg, var(--orange-dark), var(--orange)); color:white; box-shadow:0 3px 12px rgba(254,121,0,0.28) }
.btn-orange:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(254,121,0,0.35) }
.btn-sky { background: linear-gradient(135deg,#0062c8,#0090df); color:white; box-shadow:0 3px 12px rgba(0,144,223,0.28) }
.btn-sky:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,144,223,0.35) }
.btn-ghost { background:transparent; color:var(--brand); border:1.5px solid var(--border) }
.btn-ghost:hover { background:var(--bg); border-color:var(--brand) }
.btn-full { width:100%; justify-content:center }

/* ================================================================
   TOAST
================================================================ */
.toast {
  position: fixed;
  bottom: 22px; right: 22px;
  background: var(--brand-deep);
  color: white;
  padding: 11px 17px;
  border-radius: var(--r);
  font-size: 0.79rem;
  font-weight: 600;
  box-shadow: var(--sh-lg);
  z-index: 9999;
  display: flex; align-items:center; gap:8px;
  transform: translateY(70px);
  opacity: 0;
  transition: all 0.38s var(--ease);
  border-left: 3px solid var(--orange);
  max-width: 290px;
}
.toast.show { transform:translateY(0); opacity:1 }

/* ================================================================
   FOOTER
================================================================ */
.site-footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px 28px;
  display: flex; align-items:center; justify-content:space-between;
  margin-left: var(--sidebar-w);
  font-size: 0.7rem;
  color: var(--text-3);
}
.site-footer a { color:var(--brand); text-decoration:none; font-weight:600 }
.site-footer a:hover { color:var(--orange) }

/* ================================================================
   RESPONSIVE
================================================================ */
@media (max-width:900px) {
  .sidebar { transform:translateX(-100%) }
  .sidebar.open { transform:translateX(0) }
  .sidebar-backdrop.show { display:block; opacity:1 }
  .main { margin-left:0 }
  .site-footer { margin-left:0 }
  .menu-toggle { display:flex; align-items:center; justify-content:center }
}
@media (max-width:680px) {
  .body-wrap { padding:18px 14px 32px }
  .stat-grid { grid-template-columns:1fr 1fr }
  .grid-2 { grid-template-columns:1fr }
  .hero { padding:24px 20px }
  .hero h1 { font-size:1.35rem }
  .topbar { padding:10px 14px }
}
@media (max-width:420px) {
  :root { --header-h:60px }
  .stat-grid { grid-template-columns:1fr }
  .header-logo img { height:36px }
  .site-header { padding:0 16px }
}
</style>
</head>

<script>
const GA_ID = 'G-76PQ8E9KTP';
const TOTAL = 7;

const META = {
  inicio:  { label:'Inicio / Bienvenida',    icon:'🏠', order:1 },
  aula:    { label:'Aula Virtual',            icon:'💻', order:2 },
  clases:  { label:'Clases en Vivo',          icon:'🎥', order:3 },
  canvas:  { label:'Conoce la Plataforma',    icon:'🗺️', order:4 },
  pdf:     { label:'Recursos',                icon:'📄', order:5 },
  faq:     { label:'Preguntas Frecuentes',    icon:'❓', order:6 },
  ia:      { label:'Asistente IA',            icon:'🤖', order:7 },
};

const ss = {
  visited:     new Set(JSON.parse(localStorage.getItem('ci_v2_visited') || '[]')),
  start:       Date.now(),
  current:     null,
  sectionTs:   null,
};

/* ── GA4 ── */
function track(evt, extra={}) {
  if (typeof gtag !== 'function') return;
  gtag('event', evt, {
    event_category:   'student_platform',
    user_progress:    Math.round((ss.visited.size/TOTAL)*100),
    sections_visited: ss.visited.size,
    ...extra
  });
}

function trackLeave(sec) {
  if (!sec || !ss.sectionTs) return;
  const t = Math.round((Date.now()-ss.sectionTs)/1000);
  if (t>2) track('section_time_spent', { section_name:sec, time_seconds:t,
    engagement_type: t>60?'deep_read':t>20?'quick_read':'bounce' });
}

function trackView(sec) {
  const m = META[sec]||{};
  track('view_section', { section_name:sec, section_label:m.label||sec,
    section_order:m.order||0, is_first_visit:!ss.visited.has(sec),
    total_progress_pct:Math.round((ss.visited.size/TOTAL)*100) });
}

function trackMilestone(pct) {
  if ([25,50,75,100].includes(pct))
    track('progress_milestone', { milestone_pct:pct, sections_visited:ss.visited.size,
      time_to_reach_ms: Date.now()-ss.start });
}

function trackCTA(n,d){ track('cta_click',{cta_name:n,destination:d,section:ss.current}) }
function trackFAQ(q,o){ track('faq_interaction',{faq_question:q.substring(0,80),action:o?'expand':'collapse'}) }
function trackPDF(n){   track('resource_access',{resource_name:n,resource_type:'pdf'}) }
function trackIAOpen(){ track('ia_assistant_open',{progress_at_open:Math.round((ss.visited.size/TOTAL)*100)}) }

/* ── Progress ── */
function updateProgress() {
  const n=ss.visited.size, pct=Math.round((n/TOTAL)*100);
  document.getElementById('visited-count').textContent = n+'/'+TOTAL;
  document.getElementById('progress-fill').style.width  = pct+'%';
  document.getElementById('progress-pct').textContent   = pct+'%';
  ss.visited.forEach(s => { const b=document.getElementById('nav-'+s); if(b) b.classList.add('visited') });
  trackMilestone(pct);
  localStorage.setItem('ci_v2_visited', JSON.stringify([...ss.visited]));
}

function resetProgress() {
  ss.visited.clear();
  localStorage.removeItem('ci_v2_visited');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('visited'));
  updateProgress();
  showToast('Progreso reiniciado ↺');
}

/* ── Toast ── */
let _tt;
function showToast(msg, ms=2800) {
  const t=document.getElementById('toast');
  clearTimeout(_tt);
  t.innerHTML = msg;
  t.classList.add('show');
  _tt = setTimeout(()=>t.classList.remove('show'), ms);
}

/* ── Breadcrumb ── */
function setBreadcrumb(sec) {
  const el=document.getElementById('breadcrumb-current');
  if(el && META[sec]) el.textContent = META[sec].label;
}

/* ── FAQ toggle ── */
function toggleFaq(btn, q) {
  const item = btn.closest('.faq-item');
  const open = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(i=>i.classList.remove('open'));
  if (!open) { item.classList.add('open'); trackFAQ(q,true) }
  else        { trackFAQ(q,false) }
}

/* ── Load section ── */
function loadSection(sec) {
  if (!SECTIONS[sec]) return;
  trackLeave(ss.current);

  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nav-'+sec);
  if (nb) { nb.classList.add('active'); nb.scrollIntoView({behavior:'smooth',block:'nearest'}) }

  document.getElementById('content-body').innerHTML = SECTIONS[sec]();
  setBreadcrumb(sec);

  ss.current   = sec;
  ss.sectionTs = Date.now();
  ss.visited.add(sec);
  updateProgress();
  trackView(sec);

  const m = META[sec];
  if (m) showToast(m.icon + ' ' + m.label);

  if (window.innerWidth<=900) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('backdrop').classList.remove('show');
  }
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('main').scrollTo({top:0,behavior:'smooth'});
}

/* ── Mobile menu ── */
document.getElementById('menu-toggle').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('backdrop').classList.toggle('show');
});
document.getElementById('backdrop').addEventListener('click', ()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
});

/* ── Session end ── */
window.addEventListener('beforeunload', ()=>{
  trackLeave(ss.current);
  const t = Math.round((Date.now()-ss.start)/1000);
  track('session_end', { session_duration_sec:t,
    sections_completed:ss.visited.size,
    completion_pct:Math.round((ss.visited.size/TOTAL)*100) });
});

/* ── Init ── */
updateProgress();
loadSection('inicio');
</script>
</body>
</html>
